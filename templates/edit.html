{% extends "layout.html" %}

{% block title %}Editar Item - AgroStock{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h3>Editar Item</h3>
    
    <form action="{{ url_for('rotas.edit', id=alimento.id) }}" method="post" style="margin-top: 1rem;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div class="form-group">
            <label>Nome</label>
            <input type="text" name="nome" value="{{ alimento.nome }}" required>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Quantidade</label>
                <input type="number" name="quantidade" value="{{ alimento.quantidade }}" required min="0">
            </div>
            <div class="form-group">
                <label>Tipo de Animal</label>
                <input type="text" name="tipo_animal" value="{{ alimento.tipo_animal }}" required>
            </div>
        </div>
        
        <div class="form-group">
            <label>Reserva (opcional)</label>
            <input type="number" name="reserva" value="{{ alimento.reserva or '' }}" min="0">
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit">Salvar Alterações</button>
            <a href="{{ url_for('rotas.index') }}"><button type="button" class="secondary">Cancelar</button></a>
        </div>
    </form>
</div>
{% endblock %}
