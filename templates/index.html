<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/5/tinymce.min.js" referrerpolicy="origin"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque</title>
</head>
<body>
    <h1>Controle de Estoque</h1>
    <a href="{{ url_for('orcamento') }}">Ir para Orçamento</a>
    <form action="/add" method="post">
        <label for="nome">Nome do Alimento:</label>
        <input type="text" name="nome" required>
        
        <label for="quantidade">Quantidade:</label>
        <input type="number" name="quantidade" required>
        
        <label for="tipo_animal">Tipo de Animal:</label>
        <input type="text" name="tipo_animal" required>
        
        <button type="submit">Adicionar</button>
    </form>

    <br>

    <a href="/export">Exportar para Excel</a>
    
    <form action="/import" method="post" enctype="multipart/form-data">
        <label for="file">Importar do Excel:</label>
        <input type="file" name="file" accept=".xls, .xlsx">
        <button type="submit">Importar</button>
    </form>

    <br>
    <a href="{{ url_for('edit_document') }}">Editar Documento</a>
    <a href="/generate_document">Gerar Documento</a>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Quantidade</th>
            <th>Tipo de Animal</th>
        </tr>
        {% for alimento in alimentos %}
        <tr>
            <td>{{ alimento.id }}</td>
            <td>{{ alimento.nome }}</td>
            <td>{{ alimento.quantidade }}</td>
            <td>{{ alimento.tipo_animal }}</td>
        </tr>
        {% endfor %}
    </table>
    <script>
        tinymce.init({
            selector: 'textarea',  // Seletor para todos os textareas
            plugins: 'advlist autolink lists link image charmap print preview anchor',
            toolbar: 'undo redo | bold italic underline | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | link image',
            height: 300
        });
    </script>   
</body>
</html>
